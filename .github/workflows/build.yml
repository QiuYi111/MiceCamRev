name: Build MiceCam EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run unit tests
        run: uv run pytest tests/ -v

      - name: Run smoke test (source)
        run: uv run python -m micecam --check

      - name: Download ffmpeg for Windows
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Write-Host "Downloading ffmpeg..."
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Write-Host "Extracting..."
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted
          $ffmpeg = Get-ChildItem -Path ffmpeg_extracted -Recurse -Name "ffmpeg.exe" | Where-Object { $_ -like "*bin*" } | Select-Object -First 1
          Write-Host "Found: $ffmpeg"
          New-Item -ItemType Directory -Force -Path ffmpeg | Out-Null
          Copy-Item "ffmpeg_extracted/$ffmpeg" -Destination ffmpeg/ffmpeg.exe
          Write-Host "ffmpeg.exe copied"

      - name: Build EXE with PyInstaller
        run: uv run pyinstaller micecam.spec

      - name: Smoke test the EXE
        shell: pwsh
        run: |
          Write-Host "=== EXE file info ==="
          $exe = Get-Item dist/MiceCam.exe
          Write-Host "Size: $([math]::Round($exe.Length / 1MB, 1)) MB"
          Write-Host "=== Running EXE smoke test ==="
          $env:QT_QPA_PLATFORM = "offscreen"
          $proc = Start-Process -FilePath "dist/MiceCam.exe" -ArgumentList "--check" -NoNewWindow -Wait -PassThru
          Write-Host "Exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) {
            Write-Host "ERROR: EXE smoke test failed!"
            exit 1
          }
          Write-Host "EXE smoke test PASSED"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiceCam-Windows
          path: dist/MiceCam.exe
          if-no-files-found: error
