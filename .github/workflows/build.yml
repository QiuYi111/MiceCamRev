name: Build MiceCam EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Download ffmpeg for Windows
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Write-Host "Downloading ffmpeg..."
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Write-Host "Extracting..."
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted
          $ffmpeg = Get-ChildItem -Path ffmpeg_extracted -Recurse -Name "ffmpeg.exe" | Where-Object { $_ -like "*bin*" } | Select-Object -First 1
          Write-Host "Found: $ffmpeg"
          New-Item -ItemType Directory -Force -Path ffmpeg | Out-Null
          Copy-Item "ffmpeg_extracted/$ffmpeg" -Destination ffmpeg/ffmpeg.exe
          Write-Host "ffmpeg.exe -> ffmpeg/ffmpeg.exe"

      - name: Run unit tests
        run: uv run pytest tests/ -v

      - name: Run smoke test (source)
        run: uv run python -m micecam --check

      - name: Build EXE with PyInstaller
        run: uv run pyinstaller micecam.spec

      - name: Smoke test the EXE
        shell: pwsh
        run: |
          Write-Host "=== EXE file info ==="
          $exe = Get-Item dist/MiceCam.exe
          Write-Host "Size: $([math]::Round($exe.Length / 1MB, 1)) MB"
          Write-Host "=== Running EXE smoke test ==="
          $env:QT_QPA_PLATFORM = "offscreen"
          $proc = Start-Process -FilePath "dist/MiceCam.exe" -ArgumentList "--check" -NoNewWindow -Wait -PassThru
          Write-Host "Exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) {
            Write-Host "ERROR: EXE smoke test failed!"
            exit 1
          }
          Write-Host "EXE smoke test PASSED"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiceCam-Windows
          path: dist/MiceCam.exe
          if-no-files-found: error

      - name: Prepare release metadata
        if: github.event_name != 'pull_request'
        id: release_meta
        shell: pwsh
        run: |
          $tag = "v0.1.${{ github.run_number }}"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "asset=dist/MiceCam-Windows-$tag.zip" >> $env:GITHUB_OUTPUT

      - name: Package release asset
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $asset = "${{ steps.release_meta.outputs.asset }}"
          Compress-Archive -Path dist/MiceCam.exe -DestinationPath $asset -Force
          Write-Host "Release asset: $asset"

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: MiceCam ${{ steps.release_meta.outputs.tag }}
          files: ${{ steps.release_meta.outputs.asset }}
          generate_release_notes: true
          fail_on_unmatched_files: true
